name: build

# Build standalone ds2fix binaries (CLI + GUI) for Linux and Windows.
# PyInstaller can't cross-compile, so each OS is built on its own runner.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ds2fix-linux-x64
          - os: windows-latest
            artifact: ds2fix-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Linux Tk runtime (for the Tkinter GUI build)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build
        run: python build.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/ds2fix*
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ds2fix*
